version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      npm-dependencies:
        update-types:
          - 'minor'
          - 'patch'
    open-pull-requests-limit: 10
    ignore:
      # typescript-eslint@8.x (latest) only supports typescript <6.1.0 — TS 7
      # crashes it outright. Remove once typescript-eslint catches up.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # eslint-plugin-react / eslint-plugin-jsx-a11y (both latest) only
      # support eslint ^9.x — ESLint 10 crashes react/display-name outright.
      # @eslint/js is versioned in lockstep with eslint core (same blocker,
      # separate npm package) — ignore both. Remove once those plugins
      # catch up.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
